name: Stamp Version

on:
  push:
    branches: [main]

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Stamp version across all sources
        run: |
          STAMP=$(date -u +"%Y%m%d-%H%M%S")
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # 1. version.json
          echo "{\"version\":\"${STAMP}\",\"deployed\":\"${NOW}\"}" > version.json

          # 2. index.html: meta tag + all ?v= params
          sed -i "s/content=\"[^\"]*\"/content=\"${STAMP}\"/" index.html
          sed -i "s/\?v=[^\"]*/\?v=${STAMP}/g" index.html

          # 3. service-worker.js: cache name
          sed -i "s/groovelinx-[^']*/groovelinx-${STAMP}/" service-worker.js

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json index.html service-worker.js
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "chore: auto-stamp ${STAMP} [skip ci]"
          git push
