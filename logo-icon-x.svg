<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- GrooveLinx icon — drumstick X mark -->
  <!-- Two crossed drumsticks with subtle taper -->

  <!-- Stick 1: top-left to bottom-right -->
  <line x1="10" y1="6" x2="54" y2="58" stroke="#f1f5f9" stroke-width="6" stroke-linecap="round"/>
  <!-- Taper: thinner tips -->
  <line x1="6" y1="2" x2="12" y2="8" stroke="#f1f5f9" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="52" y1="56" x2="58" y2="62" stroke="#f1f5f9" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Stick 2: top-right to bottom-left -->
  <line x1="54" y1="6" x2="10" y2="58" stroke="#f1f5f9" stroke-width="6" stroke-linecap="round"/>
  <!-- Taper: thinner tips -->
  <line x1="58" y1="2" x2="52" y2="8" stroke="#f1f5f9" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="12" y1="56" x2="6" y2="62" stroke="#f1f5f9" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Accent at crossing point -->
  <circle cx="32" cy="32" r="3.5" fill="#667eea" opacity="0.5"/>
</svg>
