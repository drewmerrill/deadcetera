<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 60" fill="none">
  <!-- GROOVE LINX wordmark — drumstick X variant -->

  <!-- Base text: GROOVE LIN (standard letterforms) -->
  <text x="0" y="45" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="3" fill="#f1f5f9">
    GROOVE LIN
  </text>

  <!-- Drumstick X — two crossed sticks replacing the letter X -->
  <!-- Stick 1: top-left to bottom-right -->
  <line x1="432" y1="8" x2="472" y2="48" stroke="#f1f5f9" stroke-width="5" stroke-linecap="round"/>
  <!-- Stick 1 taper: thinner tip at top-left -->
  <line x1="429" y1="5" x2="433" y2="10" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"/>
  <!-- Stick 1 taper: thinner tip at bottom-right -->
  <line x1="471" y1="46" x2="475" y2="51" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"/>

  <!-- Stick 2: top-right to bottom-left -->
  <line x1="472" y1="8" x2="432" y2="48" stroke="#f1f5f9" stroke-width="5" stroke-linecap="round"/>
  <!-- Stick 2 taper: thinner tip at top-right -->
  <line x1="475" y1="5" x2="471" y2="10" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"/>
  <!-- Stick 2 taper: thinner tip at bottom-left -->
  <line x1="433" y1="46" x2="429" y2="51" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"/>

  <!-- Subtle accent dot at crossing point -->
  <circle cx="452" cy="28" r="2.5" fill="#667eea" opacity="0.6"/>
</svg>
